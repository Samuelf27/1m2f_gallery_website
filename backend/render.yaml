services:
  - type: web
    name: 1m2f-gallery-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: API_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: 1m2f-gallery-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: 1m2f-gallery-db
    plan: free
    databaseName: gallery
    user: gallery_user
